name: CI Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Deployment Contract
        run: npm run validate:deployment-contract

      - name: Build TypeScript
        run: npm run build

      - name: Build Function deployment package
        run: npm run build:functions:deploy

      - name: Check web app syntax
        run: node --check src/web/app.js

      - name: Run unit tests
        run: npm test

      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  validate-bicep:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate main Bicep template
        run: |
          az bicep build --file infrastructure-as-code/bicep/main.bicep
          echo "✅ Bicep template is valid"
