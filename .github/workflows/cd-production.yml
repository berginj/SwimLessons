name: Deploy to Production

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

env:
  ENVIRONMENT: production
  RESOURCE_GROUP: swim-lessons-production-rg
  LOCATION: eastus

jobs:
  deploy-infrastructure:
    name: Deploy Azure Infrastructure
    runs-on: ubuntu-latest
    environment: production
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      staticWebAppUrl: ${{ steps.deploy.outputs.staticWebAppUrl }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }}

      - name: Deploy Bicep Template
        id: deploy
        run: |
          DEPLOYMENT_NAME="deploy-$(date +%Y%m%d-%H%M%S)"

          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infrastructure-as-code/bicep/main.bicep \
            --parameters infrastructure-as-code/bicep/parameters/${{ env.ENVIRONMENT }}.parameters.json \
            --output json > deployment-output.json

          # Extract outputs
          FUNCTION_APP_NAME=$(jq -r '.properties.outputs.functionAppName.value' deployment-output.json)
          STATIC_WEB_APP_URL=$(jq -r '.properties.outputs.staticWebAppUrl.value' deployment-output.json)

          echo "functionAppName=$FUNCTION_APP_NAME" >> $GITHUB_OUTPUT
          echo "staticWebAppUrl=$STATIC_WEB_APP_URL" >> $GITHUB_OUTPUT

          echo "✅ Infrastructure deployed to production"

  deploy-functions:
    name: Deploy Function App
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Function deployment package
        run: |
          npm run build:functions:deploy
          npm install --prefix function-deploy --omit=dev

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infrastructure.outputs.functionAppName }}
          package: './function-deploy'

      - name: Verify deployment
        run: |
          echo "✅ Function App deployed to production"
          echo "URL: https://${{ needs.deploy-infrastructure.outputs.functionAppName }}.azurewebsites.net"

  deploy-web-app:
    name: Deploy Static Web App
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_POOLS_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'src/web'
          api_location: ''
          output_location: ''
          skip_app_build: true

      - name: Verify deployment
        run: |
          echo "✅ Static Web App deployed to production"
          echo "URL: ${{ needs.deploy-infrastructure.outputs.staticWebAppUrl }}"

  run-smoke-tests:
    name: Run Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-functions, deploy-web-app]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run smoke tests
        run: |
          curl --fail --silent --show-error --retry 8 --retry-delay 10 --retry-all-errors \
            "${{ needs.deploy-infrastructure.outputs.staticWebAppUrl }}/"
          curl --fail --silent --show-error --retry 8 --retry-delay 10 --retry-all-errors \
            "${{ needs.deploy-infrastructure.outputs.staticWebAppUrl }}/api/cities"
          echo "✅ Production smoke tests passed"

      - name: Notify team
        run: |
          echo "🎉 Production deployment complete!"
          # TODO: Add Slack/email notification
