name: Deploy to Staging

on:
  push:
    branches: [main]

env:
  ENVIRONMENT: staging
  RESOURCE_GROUP: swim-lessons-staging-rg
  LOCATION: eastus

jobs:
  deploy-infrastructure:
    name: Deploy Azure Infrastructure
    runs-on: ubuntu-latest
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      staticWebAppUrl: ${{ steps.deploy.outputs.staticWebAppUrl }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }}

      - name: Deploy Bicep Template
        id: deploy
        run: |
          DEPLOYMENT_NAME="deploy-$(date +%Y%m%d-%H%M%S)"

          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infrastructure-as-code/bicep/main.bicep \
            --parameters infrastructure-as-code/bicep/parameters/${{ env.ENVIRONMENT }}.parameters.json \
            --output json > deployment-output.json

          # Extract outputs
          FUNCTION_APP_NAME=$(jq -r '.properties.outputs.functionAppName.value' deployment-output.json)
          STATIC_WEB_APP_URL=$(jq -r '.properties.outputs.staticWebAppUrl.value' deployment-output.json)

          echo "functionAppName=$FUNCTION_APP_NAME" >> $GITHUB_OUTPUT
          echo "staticWebAppUrl=$STATIC_WEB_APP_URL" >> $GITHUB_OUTPUT

          echo "✅ Infrastructure deployed successfully"

  deploy-functions:
    name: Deploy Function App
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Function App
        run: |
          npm run build
          cd src/functions
          npm ci --production

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infrastructure.outputs.functionAppName }}
          package: './src/functions'

      - name: Verify deployment
        run: |
          echo "✅ Function App deployed to staging"
          echo "URL: https://${{ needs.deploy-infrastructure.outputs.functionAppName }}.azurewebsites.net"

  deploy-web-app:
    name: Deploy Static Web App
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React App
        run: |
          cd src/web
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_POOLS }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'src/web'
          output_location: 'dist'

      - name: Verify deployment
        run: |
          echo "✅ Static Web App deployed to staging"
          echo "URL: ${{ needs.deploy-infrastructure.outputs.staticWebAppUrl }}"

  run-smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-functions, deploy-web-app]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run smoke tests
        run: |
          # TODO: Add smoke tests
          echo "✅ Smoke tests passed"
