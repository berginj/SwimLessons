<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swim Lessons - Find Kids' Swim Classes in NYC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .search-filters {
            margin-bottom: 20px;
        }

        .filter-group {
            margin-bottom: 16px;
        }

        .filter-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        .days-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 6px 12px;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
        }

        .chip.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .results-header h3 {
            font-size: 18px;
            color: #111827;
        }

        .results-header select {
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
        }

        .session-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .session-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.1);
        }

        .session-title {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 6px;
        }

        .session-meta {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .session-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .session-price {
            font-size: 15px;
            font-weight: 600;
            color: #10b981;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-open {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-few-spots {
            background: #fef3c7;
            color: #92400e;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #apiStatus {
            font-size: 12px;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 16px;
            text-align: center;
        }

        .status-demo {
            background: #fef3c7;
            color: #92400e;
        }

        .status-live {
            background: #d1fae5;
            color: #065f46;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏊 Swim Lessons</h1>
            <p>Find kids' swim classes near you in NYC</p>
        </div>

        <div class="card">
            <div id="apiStatus" class="status-demo">
                ⚠️ DEMO MODE - Using mock data (Function App not deployed)
            </div>

            <div class="search-filters">
                <div class="filter-group">
                    <label>Child's Age</label>
                    <select id="childAge">
                        <option value="">Select age...</option>
                        <option value="24">2 years old</option>
                        <option value="36">3 years old</option>
                        <option value="48">4 years old</option>
                        <option value="60">5 years old</option>
                        <option value="72">6 years old</option>
                        <option value="84">7 years old</option>
                        <option value="96">8 years old</option>
                        <option value="108">9 years old</option>
                        <option value="120">10 years old</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Days of Week</label>
                    <div class="days-chips">
                        <div class="chip" data-day="0">Sun</div>
                        <div class="chip" data-day="1">Mon</div>
                        <div class="chip" data-day="2">Tue</div>
                        <div class="chip" data-day="3">Wed</div>
                        <div class="chip" data-day="4">Thu</div>
                        <div class="chip" data-day="5">Fri</div>
                        <div class="chip" data-day="6">Sat</div>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Neighborhood</label>
                    <select id="geography">
                        <option value="">All of NYC</option>
                        <option value="manhattan">Manhattan</option>
                        <option value="brooklyn">Brooklyn</option>
                        <option value="queens">Queens</option>
                        <option value="bronx">The Bronx</option>
                        <option value="staten-island">Staten Island</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Time Preference</label>
                    <select id="timeWindow">
                        <option value="">Any time</option>
                        <option value="morning">Morning (6am-12pm)</option>
                        <option value="afternoon">Afternoon (12pm-5pm)</option>
                        <option value="evening">Evening (5pm-8pm)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Max Price</label>
                    <input type="number" id="maxPrice" placeholder="Any price" step="50">
                </div>

                <button class="btn-primary" id="searchBtn">
                    🔍 Search Sessions
                </button>
            </div>
        </div>

        <div id="resultsContainer"></div>
    </div>

    <script>
        // Mock data for demo (simulates API response)
        const mockSessions = [
            {
                id: 'nyc-session-1',
                programName: 'Beginner Swim Lessons',
                providerName: 'NYC Parks & Recreation',
                locationName: 'Hamilton Fish Pool',
                borough: 'Manhattan',
                startDate: '2026-06-15',
                endDate: '2026-08-10',
                daysOfWeek: [1, 3, 5],
                timeStart: '17:30',
                timeEnd: '18:30',
                price: 180,
                availableSpots: 8,
                capacity: 12
            },
            {
                id: 'nyc-session-2',
                programName: 'Preschool Swim',
                providerName: 'YMCA Brooklyn',
                locationName: 'YMCA Brooklyn Facility',
                borough: 'Brooklyn',
                startDate: '2026-06-22',
                endDate: '2026-08-17',
                daysOfWeek: [0, 6],
                timeStart: '10:00',
                timeEnd: '11:00',
                price: 240,
                availableSpots: 3,
                capacity: 10
            },
            {
                id: 'nyc-session-3',
                programName: 'School Age Intermediate',
                providerName: 'JCC Manhattan',
                locationName: 'JCC Manhattan Pool',
                borough: 'Manhattan',
                startDate: '2026-06-08',
                endDate: '2026-08-03',
                daysOfWeek: [2, 4],
                timeStart: '16:00',
                timeEnd: '17:00',
                price: 320,
                availableSpots: 0,
                capacity: 8
            },
            {
                id: 'nyc-session-4',
                programName: 'Teen Advanced',
                providerName: 'Asphalt Green',
                locationName: 'Asphalt Green Aquatics',
                borough: 'Manhattan',
                startDate: '2026-07-06',
                endDate: '2026-08-31',
                daysOfWeek: [1, 2, 3, 4, 5],
                timeStart: '18:30',
                timeEnd: '20:00',
                price: 400,
                availableSpots: 5,
                capacity: 12
            },
            {
                id: 'nyc-session-5',
                programName: 'Weekend Beginner',
                providerName: 'Elite Swim Academy',
                locationName: 'Elite Swim Brooklyn',
                borough: 'Brooklyn',
                startDate: '2026-06-20',
                endDate: '2026-08-15',
                daysOfWeek: [6],
                timeStart: '09:00',
                timeEnd: '10:00',
                price: 350,
                availableSpots: 2,
                capacity: 6
            }
        ];

        // State
        let selectedDays = [];

        // Day chips toggle
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                chip.classList.toggle('active');
                const day = parseInt(chip.dataset.day);
                if (selectedDays.includes(day)) {
                    selectedDays = selectedDays.filter(d => d !== day);
                } else {
                    selectedDays.push(day);
                }
            });
        });

        // Search button
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const childAge = parseInt(document.getElementById('childAge').value);
            const geography = document.getElementById('geography').value;
            const timeWindow = document.getElementById('timeWindow').value;
            const maxPrice = parseFloat(document.getElementById('maxPrice').value);

            // Show loading
            showLoading();

            // Simulate API delay
            await new Promise(resolve => setTimeout(resolve, 500));

            // Filter mock data
            let results = mockSessions.filter(session => {
                // Filter by days
                if (selectedDays.length > 0) {
                    const hasOverlap = session.daysOfWeek.some(d => selectedDays.includes(d));
                    if (!hasOverlap) return false;
                }

                // Filter by geography
                if (geography && session.borough.toLowerCase() !== geography) {
                    return false;
                }

                // Filter by time
                if (timeWindow === 'morning' && parseInt(session.timeStart.split(':')[0]) >= 12) return false;
                if (timeWindow === 'afternoon' && (parseInt(session.timeStart.split(':')[0]) < 12 || parseInt(session.timeStart.split(':')[0]) >= 17)) return false;
                if (timeWindow === 'evening' && parseInt(session.timeStart.split(':')[0]) < 17) return false;

                // Filter by price
                if (maxPrice && session.price > maxPrice) return false;

                return true;
            });

            // Show results
            showResults(results);
        });

        function showLoading() {
            document.getElementById('resultsContainer').innerHTML = `
                <div class="card">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Searching for swim sessions...</div>
                    </div>
                </div>
            `;
        }

        function showResults(sessions) {
            const container = document.getElementById('resultsContainer');

            if (sessions.length === 0) {
                container.innerHTML = `
                    <div class="card">
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <h3 style="margin-bottom: 8px; color: #374151;">No sessions found</h3>
                            <p>Try adjusting your filters or selecting different days</p>
                        </div>
                    </div>
                `;
                return;
            }

            const resultsHeader = `
                <div class="card">
                    <div class="results-header">
                        <h3>${sessions.length} session${sessions.length !== 1 ? 's' : ''} found</h3>
                        <select id="sortBy">
                            <option value="date">Soonest Start</option>
                            <option value="price">Lowest Price</option>
                        </select>
                    </div>
                </div>
            `;

            const resultsCards = sessions.map(session => {
                const daysStr = session.daysOfWeek.map(d => ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d]).join(', ');
                const availabilityBadge = session.availableSpots > 0
                    ? `<span class="badge ${session.availableSpots <= 3 ? 'badge-few-spots' : 'badge-open'}">${session.availableSpots} ${session.availableSpots === 1 ? 'spot' : 'spots'} left</span>`
                    : '<span class="badge" style="background: #fee2e2; color: #991b1b;">Full - Waitlist</span>';

                return `
                    <div class="card session-card" onclick="showDetails('${session.id}')">
                        <div class="session-title">${session.programName}</div>
                        <div class="session-meta">
                            <span>📍 ${session.locationName}</span>
                            <span>🗓️ ${daysStr}</span>
                        </div>
                        <div class="session-meta">
                            <span>⏰ ${formatTime(session.timeStart)} - ${formatTime(session.timeEnd)}</span>
                            <span>📅 Starts ${formatDate(session.startDate)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                            <div class="session-price">$${session.price}</div>
                            ${availabilityBadge}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = resultsHeader + resultsCards;

            // Add sort listener
            document.getElementById('sortBy').addEventListener('change', (e) => {
                const sortBy = e.target.value;
                if (sortBy === 'price') {
                    sessions.sort((a, b) => a.price - b.price);
                } else {
                    sessions.sort((a, b) => a.startDate.localeCompare(b.startDate));
                }
                showResults(sessions);
            });
        }

        function showDetails(sessionId) {
            const session = mockSessions.find(s => s.id === sessionId);
            if (!session) return;

            const daysStr = session.daysOfWeek.map(d => ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d]).join(', ');

            const modal = document.createElement('div');
            modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;';
            modal.innerHTML = `
                <div class="card" style="max-width: 420px; max-height: 90vh; overflow-y: auto;">
                    <h2 style="font-size: 20px; margin-bottom: 16px; color: #111827;">${session.programName}</h2>

                    <div style="margin-bottom: 16px;">
                        <div style="font-size: 13px; color: #6b7280; margin-bottom: 4px;">Provider</div>
                        <div style="font-weight: 600;">${session.providerName}</div>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <div style="font-size: 13px; color: #6b7280; margin-bottom: 4px;">Location</div>
                        <div style="font-weight: 600;">${session.locationName}</div>
                        <div style="font-size: 13px; color: #6b7280;">${session.borough}</div>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <div style="font-size: 13px; color: #6b7280; margin-bottom: 4px;">Schedule</div>
                        <div style="font-weight: 600;">${daysStr}, ${formatTime(session.timeStart)}-${formatTime(session.timeEnd)}</div>
                        <div style="font-size: 13px; color: #6b7280;">${formatDate(session.startDate)} - ${formatDate(session.endDate)} (8 weeks)</div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <div style="font-size: 13px; color: #6b7280; margin-bottom: 4px;">Price</div>
                        <div style="font-size: 24px; font-weight: 600; color: #10b981;">$${session.price}</div>
                        <div style="font-size: 13px; color: #6b7280;">for full 8-week program</div>
                    </div>

                    <button class="btn-primary" onclick="window.open('https://example.com/signup/${session.id}', '_blank')">
                        Sign Up with ${session.providerName}
                    </button>

                    <button class="btn-primary" style="background: white; color: #667eea; border: 1px solid #667eea; margin-top: 8px;" onclick="this.parentElement.parentElement.remove()">
                        Close
                    </button>
                </div>
            `;

            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }

        function formatTime(time) {
            const [hours, minutes] = time.split(':');
            const h = parseInt(hours);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const displayHour = h > 12 ? h - 12 : (h === 0 ? 12 : h);
            return `${displayHour}:${minutes}${ampm}`;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Initial load - show all sessions
        window.addEventListener('load', () => {
            // Auto-trigger search to show results on load
            setTimeout(() => {
                document.getElementById('searchBtn').click();
            }, 100);
        });
    </script>
</body>
</html>
